# 实验性功能: TCP 并发连接 (提高握手成功率)
experimental:
  tcp-concurrent: true

# === DNS 配置 ===
dns:
  enable: true
  ipv6: true
  prefer-h3: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  respect-rules: true

  # === 默认 DNS (主 DNS，用于解析国内域名) ===
  nameserver:
    - "https://dns.alidns.com/dns-query" # 阿里 DoH
    - "https://doh.pub/dns-query"        # 腾讯 DoH
    - "tls://223.5.5.5"                  # 阿里 DoT (作为 HTTP/3 回退保障)

  # === 备用 DNS (Fallback，专用于解析国外被墙域名，当 nameserver 返回非 CN IP 时，采用这里的无污染结果)
  fallback:
    - "https://dns.google/dns-query"
    - "https://dns.adguard-dns.com/dns-query"
    - "https://cloudflare-dns.com/dns-query"
    - "tls://8.8.4.4"

  # === 备用 DNS 启用条件 (防污染验证机制) ===
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.twitter.com"
      - "+.youtube.com"

  # === 核心策略: DNS 分流 ===
  # 作用: 针对特定域名，强制使用特定 DNS 解析，跳过主/备 DNS 的判定逻辑，做到极致的低延迟。
  nameserver-policy:
    # 1. 网络连通性探测 (Captive Portal) -> 走系统 DNS
    "+.msftncsi.com": system
    "+.msftconnecttest.com": system
    "captive.apple.com": system
    "connectivitycheck.*.com": system
    "connect.rom.miui.com": system

    # 2. 时间同步 (NTP) & 游戏穿透 (STUN) -> 走系统 DNS
    "+.pool.ntp.org": system
    "time.*.com": system
    "time.*.gov": system
    "time.*.apple.com": system
    "stun.*": system
    "+.stun.*.*": system

    # 3. 强制直连加密 DNS
    "geosite:cn,private,apple,microsoft@cn,category-games@cn":
      - "https://223.5.5.5/dns-query"       # 阿里 DoH
      - "https://1.12.12.12/dns-query"      # 腾讯 DoH (备用)

  # === 代理节点 DNS (专门负责解析机场/节点域名) ===
  proxy-server-nameserver:
    - 223.5.5.5         # 阿里
    - 119.29.29.29      # 腾讯

  # === Fake-IP 过滤列表 (返回真实 IP) ===
  # 作用: 解决由 Fake-IP 导致的局域网无法访问、游戏 NAT 类型严格等问题
  fake-ip-filter:
    # --- 局域网 & 常见路由器后台 ---
    - +.lan
    - +.local
    - +.internal
    - +.localdomain
    - +.home.arpa
    - +.bogon
    - +.m2m
    - localhost
    - router.asus.com      # 华硕路由器
    - miwifi.com           # 小米路由器
    - tplogin.cn           # TP-Link 路由器
    - tendawifi.com        # 腾达路由器
    - p.to                 # 迅捷路由器

    # --- AdGuard & 安全 ---
    - injections.adguard.org
    - local.adguard.org

    # --- 网络连通性探测 (解决公共 WiFi 无法弹出登录页的问题) ---
    # Windows/Apple/Google/Android/MIUI
    - +.msftncsi.com
    - +.msftconnecttest.com
    - captive.apple.com
    - connectivitycheck.gstatic.com
    - connectivitycheck.android.com
    - connect.rom.miui.com

    # --- 游戏 STUN & NAT 优化 (统一改用更规范的 +. 语法) ---
    - +.srv.nintendo.net
    - +.stun.playstation.net
    - +.xboxlive.com
    - xbox.*.microsoft.com
    - +.battlenet.com.cn
    - +.turn.twilio.com
    - +.stun.twilio.com
    - stun.syncthing.net
    - stun.*

    # --- NTP 时间同步 ---
    - +.pool.ntp.org       # 统一使用 +. 包含所有 pool
    - time.windows.com
    - time.nist.gov
    - time.apple.com
    - time.asia.apple.com  # 补充苹果亚洲时间服务器

    # --- 开发者 / 泛域名映射 (直接放行根域名，替换原来复杂的通配符) ---
    - +.sslip.io
    - +.nip.io
    - 127.atlas.skk.moe

# === 域名嗅探 ===
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "+.mi.com"
    - "+.xiaomi.com"
    - "+.xiaomi.net"
    - "+.mijia.tech"
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.local"
    - "+.lan"
    - "+.home.arpa"

# === GeoData 模式 ===
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

# === 分流组 ===
proxy-groups:
  - name: 选择代理
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 手动选择
      - 其他国家节点
      - DIRECT

  - name: 手动选择
    icon: https://fastly.jsdelivr.net/gh/shindgewongxj/WHATSINStash@master/icon/select.png
    include-all: true
    type: select

  - name: YouTube
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 手动选择
      - 其他国家节点

  - name: Telegram
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 手动选择
      - 其他国家节点

  # === 自动测速组 (统一配置: 优化测速机制) ===
  - name: 香港节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png
    include-all: true
    filter: (?i)香港|港|HK|hk|Hong Kong|HongKong|hongkong|🇭🇰
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    unified-delay: true
    lazy: false

  - name: 台湾节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png
    include-all: true
    filter: (?i)台|新北|彰化|TW|Taiwan|🇹🇼
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    unified-delay: true
    lazy: true

  - name: 新加坡节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png
    include-all: true
    filter: (?i)新加坡|坡|狮城|SG|Singapore|🇸🇬
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    unified-delay: true
    lazy: true

  - name: 日本节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png
    include-all: true
    filter: (?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|🇯🇵
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    unified-delay: true
    lazy: true

  - name: 美国节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png
    include-all: true
    filter: (?i)美国|美|US|United States|🇺🇸
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    unified-delay: true
    lazy: true

  - name: 其他国家节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bot.png
    include-all: true
    exclude-filter: "(?i)香港|Hong Kong|HK|日本|Japan|JP|台湾|Taiwan|TW|中国|China|CN|美国|United States|US|新加坡|Singapore|SG|剩余|到期|排除|过滤"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    unified-delay: true
    lazy: true

  - name: GLOBAL
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
    include-all: true
    type: select
    proxies:
      - 选择代理
      - 手动选择
      - Telegram
      - YouTube
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 其他国家节点

# === 分流规则提供 ===
rule-providers:
  ADBlock:
    type: http
    behavior: domain
    format: mrs
    interval: 86400
    url: https://adrules.top/adrules-mihomo.mrs
    path: ./ruleset/ADBlock.mrs
  EHentai:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://fastly.jsdelivr.net/gh/powerfullz/override-rules@master/ruleset/EHentai.list
    path: ./ruleset/EHentai.list
  SteamFix:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://fastly.jsdelivr.net/gh/powerfullz/override-rules@master/ruleset/SteamFix.list
    path: ./ruleset/SteamFix.list
  GoogleFCM:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://fastly.jsdelivr.net/gh/powerfullz/override-rules@master/ruleset/FirebaseCloudMessaging.list
    path: ./ruleset/FirebaseCloudMessaging.list
  AdditionalFilter:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://fastly.jsdelivr.net/gh/powerfullz/override-rules@master/ruleset/AdditionalFilter.list
    path: ./ruleset/AdditionalFilter.list
  DMM:
    type: http
    behavior: classical
    format: text
    interval: 86400
    url: https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/DMM/DMM.list
    path: ./ruleset/DMM.list

rules:
  # 0. 阻断 QUIC: 强制使用 TCP 协议，保证流量能被代理正确嗅探和加速
  - AND,(DST-PORT,443),(NETWORK,UDP),REJECT
  
  # 1. 局域网/本地流量直连
  - GEOSITE,PRIVATE,DIRECT
  - GEOIP,PRIVATE,DIRECT,no-resolve

  # 2. 广告拦截
  - RULE-SET,ADBlock,REJECT
  - RULE-SET,AdditionalFilter,REJECT

  # 3. 特殊应用 & 自定义域名
  - RULE-SET,EHentai,美国节点
  - RULE-SET,DMM,日本节点
  - RULE-SET,GoogleFCM,美国节点
  - RULE-SET,SteamFix,DIRECT
  - DOMAIN,services.googleapis.cn,选择代理

  - DOMAIN-SUFFIX,hxcy.top,台湾节点
  - DOMAIN-SUFFIX,f95zone.to,美国节点
  - DOMAIN-SUFFIX,aki-game.net,新加坡节点
  - DOMAIN-SUFFIX,xn--ngstr-lra8j.com,选择代理


  - DOMAIN-KEYWORD,perfectworld.com,DIRECT
  - DOMAIN-KEYWORD,dlsite,日本节点


  # 5. GeoSite 规则 (域名类)
  - GEOSITE,GOOGLE,选择代理
  - GEOSITE,TELEGRAM,Telegram
  - GEOSITE,YOUTUBE,YouTube
  - GEOSITE,GFW,选择代理
  - GEOSITE,BILIBILI,DIRECT
  - GEOSITE,MICROSOFT@CN,DIRECT
  - GEOSITE,APPLE,DIRECT
  - GEOSITE,CN,DIRECT

  # 6. GeoIP 规则 (IP类，作为兜底)
  - GEOIP,GOOGLE,选择代理,no-resolve
  - GEOIP,TELEGRAM,Telegram,no-resolve
  - GEOIP,CN,DIRECT,no-resolve

  # 7. 最终兜底 (全局默认代理)
  - MATCH,选择代理
